openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Payment Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: payments
    description: Payment operations
  - name: clients
    description: Client operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List all payments
      parameters:
        - name: clientId
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a new payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentInput"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    get:
      operationId: getPayment
      tags: [payments]
      summary: Get a payment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updatePayment
      tags: [payments]
      summary: Update a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentInput"
      responses:
        "200":
          description: Updated payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/summary:
    get:
      operationId: getPaymentSummary
      tags: [payments]
      summary: Get payment summary totals
      parameters:
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Summary totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSummary"

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    CreateClientInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
      required:
        - name

    Payment:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        amount:
          type: number
          format: float
        paymentDate:
          type: string
          format: date
        description:
          type: string
          nullable: true
        paymentMethod:
          type: string
          enum: [cash, check, bank_transfer, credit_card, paypal, venmo, zelle, other]
        invoiceNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clientId
        - clientName
        - amount
        - paymentDate
        - paymentMethod
        - createdAt

    CreatePaymentInput:
      type: object
      properties:
        clientId:
          type: integer
        amount:
          type: number
          format: float
        paymentDate:
          type: string
          format: date
        description:
          type: string
          nullable: true
        paymentMethod:
          type: string
          enum: [cash, check, bank_transfer, credit_card, paypal, venmo, zelle, other]
        invoiceNumber:
          type: string
          nullable: true
      required:
        - clientId
        - amount
        - paymentDate
        - paymentMethod

    PaymentSummary:
      type: object
      properties:
        totalReceived:
          type: number
          format: float
        totalByMonth:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              total:
                type: number
                format: float
            required:
              - month
              - total
        totalByClient:
          type: array
          items:
            type: object
            properties:
              clientId:
                type: integer
              clientName:
                type: string
              total:
                type: number
                format: float
            required:
              - clientId
              - clientName
              - total
        totalByMethod:
          type: array
          items:
            type: object
            properties:
              method:
                type: string
              total:
                type: number
                format: float
            required:
              - method
              - total
      required:
        - totalReceived
        - totalByMonth
        - totalByClient
        - totalByMethod
